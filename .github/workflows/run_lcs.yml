name: Run LCS pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Date mode
        required: true
        default: today
        type: choice
        options: [today, tomorrow, custom]
      custom_date:
        description: Custom target datetime in UTC (YYYY-MM-DD or YYYY-MM-DDTHH:MM:SSZ)
        required: false
        default: ""
        type: string
      backward_days:
        description: Backward days
        required: true
        default: "7"
        type: string
      lon_min:
        description: Minimum longitude (east)
        required: true
        default: "61.0"
        type: string
      lon_max:
        description: Maximum longitude (east)
        required: true
        default: "65.0"
        type: string
      lat_min:
        description: Minimum latitude (north)
        required: true
        default: "17.0"
        type: string
      lat_max:
        description: Maximum latitude (north)
        required: true
        default: "22.0"
        type: string
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: lcs-pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
      PYTHONUNBUFFERED: '1'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Scheduled runs from config
        if: github.event_name == 'schedule'
        run: python scripts/run_scheduled_modes.py
      - name: Manual run from workflow inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          python scripts/run_pipeline.py \
            --config config/defaults.json \
            --mode "${{ inputs.mode }}" \
            --custom-date "${{ inputs.custom_date }}" \
            --backward-days "${{ inputs.backward_days }}" \
            --lon-min "${{ inputs.lon_min }}" \
            --lon-max "${{ inputs.lon_max }}" \
            --lat-min "${{ inputs.lat_min }}" \
            --lat-max "${{ inputs.lat_max }}" \
            --skip-confirm \
            --label "${{ inputs.mode }}"
      - name: Build Pages content
        run: python scripts/build_pages.py
      - name: Upload latest outputs artifact
        uses: actions/upload-artifact@v6
        with:
          name: lcs-latest-outputs
          path: |
            outputs/latest/**
            docs/latest/**
          if-no-files-found: error
      - name: Commit latest outputs and docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/latest docs/latest
          git commit -m "Update latest LCS outputs [skip ci]" || echo "No changes to commit"
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/latest
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: run
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
